<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Picture Republiq</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=switzer@300,400,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #101010 url("assets/logo1.jpg") center / cover no-repeat;
      padding: 24px;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.82);
    }
    .login-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: var(--white);
      border-top: 3px solid var(--gold);
      padding: 54px 44px 46px;
      text-align: center;
      animation: fadeUp 0.6s ease;
    }
    .login-card img { width: 120px; margin: 0 auto 22px; filter: invert(1); }
    .login-card h1 { font-size: 30px; margin-bottom: 8px; }
    .login-card .sub { font-size: 14px; color: var(--muted); margin-bottom: 30px; }
    .login-card input[type="password"] {
      width: 100%;
      font-family: var(--font-sans);
      font-size: 16px;
      font-weight: 300;
      padding: 15px 18px;
      border: 1px solid var(--line);
      background: var(--ivory);
      color: var(--text);
      border-radius: 0;
      -webkit-appearance: none;
      appearance: none;
      text-align: center;
      letter-spacing: 0.2em;
    }
    .login-card input[type="password"]:focus { outline: none; border-color: var(--gold); background: var(--white); }
    .login-card .btn { width: 100%; margin-top: 16px; }
    .login-error {
      display: none;
      margin-top: 16px;
      font-size: 13.5px;
      color: #a4392f;
    }
    .login-error.show { display: block; animation: fadeUp 0.4s ease; }
    .back-link {
      display: inline-block;
      margin-top: 26px;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--gold-dark); }
  </style>
</head>
<body>

<div class="login-card">
  <img src="assets/logo-mark-white.png" alt="Picture Republiq">
  <h1>Admin Access</h1>
  <p class="sub">Enter the admin password to continue.</p>
  <form id="loginForm" novalidate>
    <input type="password" id="pw" placeholder="Password" autocomplete="current-password" required autofocus>
    <button type="submit" class="btn gold">Log In</button>
  </form>
  <p class="login-error" id="loginError">Incorrect password. Please try again.</p>
  <a class="back-link" href="index.html">&larr; Back to website</a>
</div>

<script>
(function () {
  // Already logged in this session? Straight to the dashboard.
  try { if (sessionStorage.getItem("pr-admin") === "1") { location.replace("admin.html"); return; } } catch (e) {}

  // SHA-256 of the admin password (kept as a hash so the password
  // is not written in plain text in this file).
  var HASH = "d149f575651ad5cbf647353f662b263666d1218568287d311ac18dbf4f78c3d3";

  async function sha256(text) {
    var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(function (b) { return b.toString(16).padStart(2, "0"); }).join("");
  }

  document.getElementById("loginForm").addEventListener("submit", async function (ev) {
    ev.preventDefault();
    var pw = document.getElementById("pw").value;
    var err = document.getElementById("loginError");
    if (pw && await sha256(pw) === HASH) {
      try { sessionStorage.setItem("pr-admin", "1"); } catch (e) {}
      location.replace("admin.html");
    } else {
      err.classList.add("show");
      document.getElementById("pw").value = "";
      document.getElementById("pw").focus();
    }
  });
})();
</script>
</body>
</html>
